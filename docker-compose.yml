version: '3.8'

# ══════════════════════════════════════════════════════════════
#  Orders Analytics Pipeline — Docker Compose
#  Stack  : Airflow 2.9 + PySpark | ClickHouse | Metabase
#  Source : http://96.9.212.102:8000/orders
# ══════════════════════════════════════════════════════════════

x-airflow-common:
  &airflow-common
  build: .
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__WEBSERVER__SECRET_KEY=rahasia_orders_mci2026
    - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
    - AIRFLOW__LOGGING__LOG_LEVEL=INFO
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data_lake:/opt/airflow/data_lake
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL (Airflow metadata DB) ──────────────────────
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # ── Airflow Init (jalankan sekali saat pertama kali) ──────
  airflow-init:
    <<: *airflow-common
    container_name: mci2026_airflow_init
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --firstname Admin --lastname MCI2026
      --role Admin --email admin@mci2026.com --password admin"
    restart: "no"

  # ── Airflow Webserver (UI) ─────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow Scheduler ──────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  # ── ClickHouse (Data Warehouse) ────────────────────────────
  clickhouse-server:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP interface (untuk Metabase & curl)
      - "9000:9000"   # Native TCP (untuk clickhouse-driver Python)
    environment:
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=rahasia
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # Gunakan HTTP ping endpoint — tidak perlu credentials
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Metabase (Visualisasi & Dashboard) ────────────────────
  # Untuk menghubungkan Metabase ke ClickHouse, download plugin dulu:
  #   mkdir -p metabase-plugins
  #   curl -L -o metabase-plugins/clickhouse.metabase-driver.jar \
  #     https://github.com/ClickHouse/metabase-clickhouse-driver/releases/latest/download/clickhouse.metabase-driver.jar
  # Lalu restart container metabase.
  # Di Metabase UI: Add Database → ClickHouse
  #   Host: clickhouse-server  Port: 8123
  #   User: admin  Password: rahasia  Database: analytics
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - JAVA_OPTS=-Xmx512m
      - MB_PLUGINS_DIR=/plugins
    volumes:
      - ./metabase-plugins:/plugins
      - metabase_data:/metabase-data
    depends_on:
      clickhouse-server:
        condition: service_healthy
    restart: unless-stopped

# ── Named Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
  clickhouse_data:
  metabase_data:
  airflow_logs:
